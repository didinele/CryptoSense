description: "Analyst Agent Evals - Technical price analysis"

evaluateOptions:
  maxConcurrency: 1

providers:
  - id: openai:chat:llama3
    config:
      apiBaseUrl: "http://localhost:11434/v1"
      apiKey: "ollama"

prompts:
  - |
    Ești un analist tehnic crypto expert.
    Analizează următoarele prețuri recente pentru {{symbol}}: {{prices}}.
    Te rog să extragi nivelul de suport (cel mai mic punct recent), nivelul de rezistență (cel mai mare punct recent) și să declari un trend (bullish/bearish/neutral).

    CALCULUL VOLATILITĂȚII (urmează pașii în ordine):
    Pasul 1: primul_pret = primul număr din array, ultimul_pret = ultimul număr din array.
    Pasul 2: volatilityPercentage = ABS((ultimul_pret - primul_pret) / primul_pret * 100)
    Pasul 3: Compară cu pragul de 5%:
      - DACĂ volatilityPercentage > 5 → volatilityAlert = true, păstrează valoarea calculată
      - DACĂ volatilityPercentage <= 5 → volatilityAlert = false, volatilityPercentage = 0

    Exemplu corect pentru prețuri stabile [100, 101, 99, 100.5]:
      volatilityPercentage = ABS((100.5 - 100) / 100 * 100) = 0.5
      0.5 <= 5 → volatilityAlert = false, volatilityPercentage = 0

    Exemplu corect pentru dump [100, 90, 85, 80]:
      volatilityPercentage = ABS((80 - 100) / 100 * 100) = ABS(-20) = 20
      20 > 5 → volatilityAlert = true, volatilityPercentage = 20

    Exemplu corect pentru rally major [2000, 2300, 2500, 2700]:
      volatilityPercentage = ABS((2700 - 2000) / 2000 * 100) = ABS(700 / 2000 * 100) = ABS(35) = 35
      35 > 5 → volatilityAlert = true, volatilityPercentage = 35

    Răspunde STRICT folosind următoarea structură JSON, fără nimic altceva:
    {
      "trend": "bullish" | "bearish" | "neutral",
      "support": număr,
      "resistance": număr,
      "volatilityAlert": boolean,
      "volatilityPercentage": număr procentual brut,
      "reasoning": "scurtă explicație tehnică"
    }

defaultTest:
  assert:
    - type: javascript
      value: |
        const m = output.match(/\{[\s\S]*\}/);
        if (!m) return false;
        const o = JSON.parse(m[0]);
        return ['bullish', 'bearish', 'neutral'].includes(o.trend) &&
          typeof o.support === 'number' &&
          typeof o.resistance === 'number' &&
          typeof o.volatilityAlert === 'boolean' &&
          typeof o.volatilityPercentage === 'number' &&
          typeof o.reasoning === 'string' &&
          o.reasoning.length > 0;

tests:
  - description: "Stable prices (< 5% change) - no volatility alert expected"
    vars:
      symbol: BTCUSDT
      prices: "60000, 60200, 59900, 60100"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          const o = m ? JSON.parse(m[0]) : {};
          return o.volatilityAlert === false;

  - description: "15% dump - volatility alert, bearish trend, percentage >= 5"
    vars:
      symbol: BTCUSDT
      prices: "100, 96, 92, 85"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          const o = m ? JSON.parse(m[0]) : {};
          return o.volatilityAlert === true;
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          const o = m ? JSON.parse(m[0]) : {};
          return Math.abs(o.volatilityPercentage) >= 5;
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          const o = m ? JSON.parse(m[0]) : {};
          return o.trend === 'bearish';

  - description: "35% rally - bullish trend, volatility alert"
    vars:
      symbol: ETHUSDT
      prices: "2000, 2300, 2500, 2700"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          const o = m ? JSON.parse(m[0]) : {};
          return o.trend === 'bullish';
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          const o = m ? JSON.parse(m[0]) : {};
          return o.volatilityAlert === true;

  - description: "Support must always be strictly less than resistance"
    vars:
      symbol: SOLUSDT
      prices: "150, 145, 155, 148, 152"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          const o = m ? JSON.parse(m[0]) : {};
          return o.support < o.resistance;

  - description: "Sideways market - neutral trend"
    vars:
      symbol: ADAUSDT
      prices: "0.50, 0.50, 0.50, 0.50"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          const o = m ? JSON.parse(m[0]) : {};
          return o.trend === 'neutral';

  - description: "Clear >5% drop (30%) - volatility alert expected"
    vars:
      symbol: FAKECOIN
      prices: "100, 90, 80, 70"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          const o = m ? JSON.parse(m[0]) : {};
          return o.volatilityAlert === true;
