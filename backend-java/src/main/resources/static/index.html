<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Portfolio Dashboard</title>
    <style>
        :root {
            --bg-primary: #f2f5f9;
            --bg-accent: #e4ecf8;
            --card: #ffffff;
            --text-main: #19202a;
            --text-muted: #5f6f81;
            --line: #d7dee8;
            --brand: #0f4c81;
            --brand-strong: #0b355b;
            --danger: #d64545;
            --warning-bg: #fff5d9;
            --warning-text: #7a5b00;
            --ok: #1f8a4d;
            --shadow: 0 18px 40px rgba(21, 49, 84, 0.12);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Inter", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 15% 20%, var(--bg-accent), transparent 45%),
                radial-gradient(circle at 80% 10%, #d8e6fb, transparent 42%),
                linear-gradient(160deg, #f7f9fc 0%, var(--bg-primary) 100%);
            min-height: 100vh;
            padding: 28px 16px;
        }

        .dashboard {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--card);
            border: 1px solid rgba(15, 76, 129, 0.12);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: riseIn 420ms ease-out;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 14px;
            padding: 24px;
            background: linear-gradient(120deg, var(--brand-strong), var(--brand));
            color: #f6fbff;
        }

        .brand-title {
            margin: 0;
            font-size: 1.35rem;
            letter-spacing: 0.2px;
        }

        .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-card {
            min-width: 200px;
            padding: 12px 14px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(2px);
        }

        .stat-label {
            margin: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.9;
        }

        .stat-value {
            margin: 6px 0 0;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .content {
            padding: 22px 24px 24px;
        }

        .warning {
            display: none;
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid #f2d280;
            background: var(--warning-bg);
            color: var(--warning-text);
            font-size: 0.92rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 0.7fr 0.9fr auto;
            gap: 10px;
            align-items: end;
            margin-bottom: 18px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 0.84rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .field input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font: inherit;
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        .field input:focus {
            outline: none;
            border-color: #4d8ec5;
            box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.15);
        }

        .btn {
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            cursor: pointer;
            font: inherit;
            font-weight: 600;
            transition: transform 120ms ease, filter 120ms ease;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--brand);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
        }

        thead {
            background: #edf3fa;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            font-size: 0.94rem;
        }

        th {
            color: #2d3f53;
            font-weight: 700;
        }

        tbody tr {
            transition: background-color 120ms ease;
        }

        tbody tr:hover {
            background: #f8fbff;
        }

        .status-pill {
            display: inline-block;
            padding: 4px 9px;
            border-radius: 999px;
            background: #eaf7ef;
            color: var(--ok);
            font-size: 0.78rem;
            font-weight: 600;
        }

        .actions {
            margin-top: 14px;
            display: flex;
            justify-content: flex-end;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 920px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }

            .form-row .btn {
                width: 100%;
            }
        }

        @media (max-width: 620px) {
            body {
                padding: 14px;
            }

            .topbar,
            .content {
                padding: 18px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stat-card {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
<main class="dashboard">
    <section class="topbar">
        <h1 class="brand-title">Stock Portfolio Dashboard</h1>
        <div class="stats">
            <article class="stat-card">
                <p class="stat-label">User Name</p>
                <p class="stat-value" id="userName">Loading...</p>
            </article>
            <article class="stat-card">
                <p class="stat-label">Total Net Worth</p>
                <p class="stat-value" id="totalNetWorth">$0.00</p>
            </article>
        </div>
    </section>

    <section class="content">
        <div class="warning" id="warningBanner"></div>

        <form id="assetForm" class="form-row">
            <div class="field">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" placeholder="Apple" required />
            </div>
            <div class="field">
                <label for="ticker">Ticker</label>
                <input id="ticker" name="ticker" type="text" placeholder="AAPL" required />
            </div>
            <div class="field">
                <label for="quantity">Quantity</label>
                <input id="quantity" name="quantity" type="number" step="1" min="1" placeholder="10" required />
            </div>
            <div class="field">
                <label for="purchasePrice">Purchase Price</label>
                <input id="purchasePrice" name="purchasePrice" type="number" step="0.01" min="0.01" placeholder="173.45" required />
            </div>
            <button type="submit" class="btn btn-primary">Add Asset</button>
        </form>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Ticker</th>
                    <th>Quantity</th>
                    <th>Buy Price</th>
                    <th>Total Invested</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody id="assetsTableBody"></tbody>
            </table>
        </div>

        <div class="actions">
            <button type="button" id="clearPortfolioBtn" class="btn btn-danger">Clear Portfolio</button>
        </div>
    </section>
</main>

<script>
    const USER_ID = 1;

    const userNameEl = document.getElementById("userName");
    const totalNetWorthEl = document.getElementById("totalNetWorth");
    const assetsTableBodyEl = document.getElementById("assetsTableBody");
    const warningBannerEl = document.getElementById("warningBanner");
    const assetFormEl = document.getElementById("assetForm");
    const clearPortfolioBtnEl = document.getElementById("clearPortfolioBtn");

    function showWarning(message) {
        warningBannerEl.textContent = message;
        warningBannerEl.style.display = "block";
    }

    function hideWarning() {
        warningBannerEl.style.display = "none";
        warningBannerEl.textContent = "";
    }

    function formatCurrency(value) {
        return `$${Number(value).toFixed(2)}`;
    }

    function handleApiError(response, fallbackMessage) {
        if (response.status === 429) {
            showWarning("Rate limit reached. Please wait a few seconds and try again.");
        } else {
            showWarning(fallbackMessage);
        }
    }

    function renderAssets(assets) {
        if (!Array.isArray(assets) || assets.length === 0) {
            assetsTableBodyEl.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align:center; color:#5f6f81;">No assets yet. Add your first position above.</td>
                </tr>
            `;
            return;
        }

        assetsTableBodyEl.innerHTML = assets
            .map((asset) => {
                const invested = Number(asset.quantity) * Number(asset.purchasePrice);
                return `
                    <tr>
                        <td>${asset.name}</td>
                        <td>${asset.ticker}</td>
                        <td>${asset.quantity}</td>
                        <td>${formatCurrency(asset.purchasePrice)}</td>
                        <td>${formatCurrency(invested)}</td>
                        <td><span class="status-pill">Active</span></td>
                    </tr>
                `;
            })
            .join("");
    }

    async function fetchPortfolio() {
        try {
            hideWarning();

            const [userResponse, valueResponse] = await Promise.all([
                fetch(`/api/users/${USER_ID}`),
                fetch(`/api/users/${USER_ID}/current-value`)
            ]);

            if (!userResponse.ok) {
                handleApiError(userResponse, "Unable to load user and assets.");
                return;
            }

            if (!valueResponse.ok) {
                handleApiError(valueResponse, "Unable to load current portfolio value.");
                return;
            }

            const user = await userResponse.json();
            const currentValue = await valueResponse.json();

            userNameEl.textContent = user.username || "Unknown User";
            totalNetWorthEl.textContent = formatCurrency(currentValue || 0);
            renderAssets(user.assets || []);
        } catch (error) {
            showWarning("Network error while contacting the API. Please verify the backend is running.");
        }
    }

    async function addAsset(event) {
        event.preventDefault();

        const formData = new FormData(assetFormEl);
        const payload = {
            name: String(formData.get("name") || "").trim(),
            ticker: String(formData.get("ticker") || "").trim().toUpperCase(),
            quantity: Number(formData.get("quantity")),
            purchasePrice: Number(formData.get("purchasePrice"))
        };

        try {
            hideWarning();
            const response = await fetch(`/api/users/${USER_ID}/assets`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                handleApiError(response, "Could not add asset. Please check the entered values.");
                return;
            }

            assetFormEl.reset();
            await fetchPortfolio();
        } catch (error) {
            showWarning("Network error while adding asset.");
        }
    }

    async function clearPortfolio() {
        const confirmed = window.confirm("Clear all assets from this portfolio?");
        if (!confirmed) {
            return;
        }

        try {
            hideWarning();
            const response = await fetch(`/api/users/${USER_ID}/assets`, {
                method: "DELETE"
            });

            if (!response.ok) {
                handleApiError(response, "Could not clear portfolio.");
                return;
            }

            await fetchPortfolio();
        } catch (error) {
            showWarning("Network error while clearing portfolio.");
        }
    }

    assetFormEl.addEventListener("submit", addAsset);
    clearPortfolioBtnEl.addEventListener("click", clearPortfolio);

    fetchPortfolio();
</script>
</body>
</html>
