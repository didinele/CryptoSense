services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptosense-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/cryptosense
    ports:
      - '3000:3000'
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: cryptosense-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cryptosense
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
